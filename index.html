<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programare Online</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --gradient: linear-gradient(135deg, #667eea, #764ba2);
      --text: #1a202c;
      --muted: #718096;
      --border: #e2e8f0;
      --bg-soft: #f7fafc;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #eef2ff 0%, #f0f4f8 50%, #fdf2f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(80, 70, 180, 0.12);
      padding: 36px 32px;
      width: 100%;
      max-width: 520px;
      position: relative;
    }

    .header { margin-bottom: 24px; padding-right: 44px; }
    h1 { font-size: 1.5rem; color: var(--text); margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 0.92rem; }

    /* buton setari */
    .gear-btn {
      position: absolute;
      top: 24px; right: 24px;
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-soft);
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .gear-btn:hover { background: #edf2f7; transform: rotate(30deg); }

    /* pasi */
    .steps {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .step {
      flex: 1;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      padding: 7px 4px;
      border-radius: 8px;
      background: var(--bg-soft);
      border: 1px solid var(--border);
    }
    .step.active {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
    }
    .step.done { color: var(--primary-dark); border-color: var(--primary); }

    /* calendar */
    .cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cal-title { font-weight: 700; color: var(--text); text-transform: capitalize; }
    .cal-nav {
      width: 34px; height: 34px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
      transition: background 0.15s;
    }
    .cal-nav:hover:not(:disabled) { background: var(--bg-soft); }
    .cal-nav:disabled { opacity: 0.35; cursor: default; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      padding: 6px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 0.9rem;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s;
    }
    .cal-day:hover:not(:disabled):not(.selected) { background: #edf2f7; }
    .cal-day:disabled { color: #cbd5e0; cursor: default; }
    .cal-day.available { font-weight: 600; color: var(--primary-dark); background: #eef2ff; }
    .cal-day.available:hover { background: #e0e7ff; }
    .cal-day.selected { background: var(--gradient); color: #fff; font-weight: 700; }
    .cal-day.today { outline: 2px solid var(--primary); outline-offset: -2px; }

    /* sloturi ore */
    .section-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin: 18px 0 8px;
    }
    .slots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(86px, 1fr));
      gap: 8px;
    }
    .slot {
      padding: 9px 4px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: border 0.15s, background 0.15s;
    }
    .slot:hover:not(:disabled):not(.selected) { border-color: var(--primary); }
    .slot.selected { background: var(--gradient); color: #fff; border-color: transparent; }
    .slot:disabled {
      color: #cbd5e0;
      background: var(--bg-soft);
      cursor: not-allowed;
      text-decoration: line-through;
    }
    .slots-empty { color: var(--muted); font-size: 0.88rem; padding: 8px 0; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 5px;
      margin-top: 16px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: #2d3748;
      transition: border 0.2s;
      background: var(--bg-soft);
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    textarea { resize: vertical; min-height: 70px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .summary {
      margin-top: 18px;
      padding: 12px 16px;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #3730a3;
      display: none;
    }
    .summary.visible { display: block; }

    .btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .msg {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }
    .msg.success { background: #c6f6d5; color: #276749; display: block; }
    .msg.error   { background: #fed7d7; color: #9b2c2c; display: block; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* modal setari */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { font-size: 1.15rem; color: var(--text); margin-bottom: 4px; }
    .modal .subtitle { margin-bottom: 12px; }

    .day-checks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .day-check { position: relative; }
    .day-check input { position: absolute; opacity: 0; inset: 0; cursor: pointer; }
    .day-check span {
      display: block;
      text-align: center;
      padding: 9px 2px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s;
    }
    .day-check input:checked + span {
      background: var(--gradient);
      color: #fff;
      border-color: transparent;
    }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-secondary {
      flex: 1;
      padding: 12px;
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #edf2f7; }
    .modal-actions .btn { margin-top: 0; flex: 2; }
  </style>
</head>
<body>
  <div class="card">
    <button class="gear-btn" id="gearBtn" title="Setari disponibilitate" aria-label="Setari">⚙️</button>

    <div class="header">
      <h1>📅 Programare Online</h1>
      <p class="subtitle">Alege ziua, ora si completeaza datele tale.</p>
    </div>

    <div class="steps">
      <div class="step active" id="step1">1. Ziua</div>
      <div class="step" id="step2">2. Ora</div>
      <div class="step" id="step3">3. Datele tale</div>
    </div>

    <!-- calendar -->
    <div class="cal-head">
      <button class="cal-nav" id="prevMonth" aria-label="Luna anterioara">‹</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav" id="nextMonth" aria-label="Luna urmatoare">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>

    <!-- sloturi -->
    <div id="slotsSection" style="display:none">
      <span class="section-label" id="slotsLabel">Alege ora</span>
      <div class="slots" id="slots"></div>
    </div>

    <form id="bookingForm" style="display:none">
      <label for="name">Nume complet *</label>
      <input type="text" id="name" placeholder="Ion Popescu" required />

      <div class="row">
        <div>
          <label for="phone">Telefon *</label>
          <input type="tel" id="phone" placeholder="07XX XXX XXX" required />
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="ion@email.com" />
        </div>
      </div>

      <label for="service">Serviciu</label>
      <select id="service">
        <option value="Consultatie">Consultatie</option>
        <option value="Intalnire">Intalnire</option>
        <option value="Altul">Altul</option>
      </select>

      <label for="notes">Mentiuni (optional)</label>
      <textarea id="notes" placeholder="Scrie orice detalii relevante..."></textarea>

      <div class="summary" id="summary"></div>

      <button type="submit" class="btn" id="submitBtn">Confirma programarea</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <!-- modal setari -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal">
      <h2>⚙️ Setari disponibilitate</h2>
      <p class="subtitle">Alege zilele si orele in care accepti programari.</p>

      <label>Parola admin</label>
      <input type="password" id="adminPass" placeholder="Parola" autocomplete="current-password" />

      <label>Zile disponibile</label>
      <div class="day-checks" id="dayChecks"></div>

      <div class="row">
        <div>
          <label for="setStart">De la ora</label>
          <input type="time" id="setStart" step="900" />
        </div>
        <div>
          <label for="setEnd">Pana la ora</label>
          <input type="time" id="setEnd" step="900" />
        </div>
      </div>

      <label for="setSlot">Durata unei programari</label>
      <select id="setSlot">
        <option value="15">15 minute</option>
        <option value="30">30 minute</option>
        <option value="45">45 minute</option>
        <option value="60">1 ora</option>
        <option value="90">1 ora si 30 min</option>
        <option value="120">2 ore</option>
      </select>

      <div class="msg" id="settingsMsg"></div>

      <div class="modal-actions">
        <button class="btn-secondary" id="closeModal">Inchide</button>
        <button class="btn" id="saveSettings">Salveaza</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://programare-calendar-worker.telefonsms0.workers.dev';

    const MONTHS = ['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
    const DOW = ['Lu','Ma','Mi','Jo','Vi','Sa','Du'];        // luni primul
    const DAY_NAMES = ['Duminica','Luni','Marti','Miercuri','Joi','Vineri','Sambata'];

    let settings = { days: [1,2,3,4,5], startTime: '09:00', endTime: '17:00', slotMinutes: 60 };
    let viewYear, viewMonth;        // luna afisata in calendar
    let selectedDate = null;        // 'YYYY-MM-DD'
    let selectedTime = null;        // 'HH:MM'

    const today = new Date();
    today.setHours(0, 0, 0, 0);
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();

    const $ = id => document.getElementById(id);

    function pad(n) { return String(n).padStart(2, '0'); }
    function dateStr(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
    function toMinutes(hhmm) { const [h, m] = hhmm.split(':').map(Number); return h * 60 + m; }

    // ---------- calendar ----------
    function renderCalendar() {
      $('calTitle').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
      const grid = $('calGrid');
      grid.innerHTML = '';

      DOW.forEach(d => {
        const el = document.createElement('div');
        el.className = 'cal-dow';
        el.textContent = d;
        grid.appendChild(el);
      });

      const first = new Date(viewYear, viewMonth, 1);
      const offset = (first.getDay() + 6) % 7;   // luni = 0
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      for (let i = 0; i < offset; i++) grid.appendChild(document.createElement('div'));

      for (let d = 1; d <= daysInMonth; d++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cal-day';
        btn.textContent = d;

        const cellDate = new Date(viewYear, viewMonth, d);
        const ds = dateStr(viewYear, viewMonth, d);
        const isPast = cellDate < today;
        const isAllowed = settings.days.includes(cellDate.getDay());

        if (cellDate.getTime() === today.getTime()) btn.classList.add('today');

        if (isPast || !isAllowed) {
          btn.disabled = true;
        } else {
          btn.classList.add('available');
          if (ds === selectedDate) btn.classList.add('selected');
          btn.addEventListener('click', () => selectDate(ds));
        }
        grid.appendChild(btn);
      }

      // nu permite navigarea inainte de luna curenta
      $('prevMonth').disabled = viewYear === today.getFullYear() && viewMonth === today.getMonth();
    }

    $('prevMonth').addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    });
    $('nextMonth').addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    });

    // ---------- sloturi ----------
    async function selectDate(ds) {
      selectedDate = ds;
      selectedTime = null;
      renderCalendar();
      setStep(2);
      $('bookingForm').style.display = 'none';
      $('slotsSection').style.display = 'block';

      const d = new Date(ds + 'T00:00:00');
      $('slotsLabel').textContent = `Alege ora — ${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;
      const slotsEl = $('slots');
      slotsEl.innerHTML = '<div class="slots-empty">Se incarca orele disponibile...</div>';

      let taken = [];
      try {
        const res = await fetch(`${WORKER_URL}/slots?date=${ds}`);
        if (res.ok) taken = (await res.json()).taken || [];
      } catch { /* daca nu merge, aratam toate sloturile */ }

      renderSlots(taken);
    }

    function renderSlots(taken) {
      const slotsEl = $('slots');
      slotsEl.innerHTML = '';

      const startM = toMinutes(settings.startTime);
      const endM = toMinutes(settings.endTime);
      const now = new Date();
      let count = 0;

      for (let m = startM; m + settings.slotMinutes <= endM; m += settings.slotMinutes) {
        const hh = pad(Math.floor(m / 60)), mm = pad(m % 60);
        const time = `${hh}:${mm}`;
        const slotStart = new Date(`${selectedDate}T${time}:00`);
        const slotEnd = new Date(slotStart.getTime() + settings.slotMinutes * 60000);

        const isPast = slotStart <= now;
        const isTaken = taken.some(t => t.start < slotEnd.getTime() && t.end > slotStart.getTime());

        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'slot';
        btn.textContent = time;
        if (isPast || isTaken) {
          btn.disabled = true;
        } else {
          btn.addEventListener('click', () => selectTime(time));
          count++;
        }
        slotsEl.appendChild(btn);
      }

      if (!count) {
        slotsEl.innerHTML = '<div class="slots-empty">Nu mai sunt ore disponibile in aceasta zi. Alege alta zi din calendar.</div>';
      }
    }

    function selectTime(time) {
      selectedTime = time;
      document.querySelectorAll('.slot').forEach(b => b.classList.toggle('selected', b.textContent === time));
      setStep(3);
      $('bookingForm').style.display = 'block';

      const d = new Date(selectedDate + 'T00:00:00');
      const sum = $('summary');
      sum.textContent = `📌 Programare: ${DAY_NAMES[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}, ora ${time}`;
      sum.classList.add('visible');
      $('name').focus();
    }

    function setStep(n) {
      [1, 2, 3].forEach(i => {
        const el = $('step' + i);
        el.classList.toggle('active', i === n);
        el.classList.toggle('done', i < n);
      });
    }

    // ---------- trimitere ----------
    $('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!selectedDate || !selectedTime) return;

      const btn = $('submitBtn');
      const msg = $('msg');

      const data = {
        name:    $('name').value.trim(),
        phone:   $('phone').value.trim(),
        email:   $('email').value.trim(),
        date:    selectedDate,
        time:    selectedTime,
        service: $('service').value,
        notes:   $('notes').value.trim(),
      };

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Se trimite...';
      msg.className = 'msg';
      msg.textContent = '';

      try {
        const res = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });

        const json = await res.json();

        if (res.ok) {
          msg.className = 'msg success';
          msg.textContent = '✅ Programarea a fost inregistrata! Te vom contacta in curand.';
          e.target.reset();
          $('bookingForm').style.display = 'none';
          $('slotsSection').style.display = 'none';
          $('summary').classList.remove('visible');
          selectedDate = null;
          selectedTime = null;
          setStep(1);
          renderCalendar();
        } else {
          msg.className = 'msg error';
          msg.textContent = json.error || 'Eroare necunoscuta';
          if (res.status === 409) selectDate(selectedDate); // reincarca sloturile
        }
      } catch (err) {
        msg.className = 'msg error';
        msg.textContent = 'A aparut o eroare: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Confirma programarea';
      }
    });

    // ---------- setari (admin) ----------
    const ORDER = [1, 2, 3, 4, 5, 6, 0]; // luni primul

    function renderDayChecks() {
      const wrap = $('dayChecks');
      wrap.innerHTML = '';
      ORDER.forEach(d => {
        const lab = document.createElement('label');
        lab.className = 'day-check';
        lab.innerHTML = `<input type="checkbox" value="${d}" ${settings.days.includes(d) ? 'checked' : ''}><span>${DAY_NAMES[d].slice(0, 2)}</span>`;
        wrap.appendChild(lab);
      });
    }

    $('gearBtn').addEventListener('click', () => {
      renderDayChecks();
      $('setStart').value = settings.startTime;
      $('setEnd').value = settings.endTime;
      $('setSlot').value = settings.slotMinutes;
      $('settingsMsg').className = 'msg';
      $('settingsModal').classList.add('open');
    });

    $('closeModal').addEventListener('click', () => $('settingsModal').classList.remove('open'));
    $('settingsModal').addEventListener('click', (e) => {
      if (e.target === $('settingsModal')) $('settingsModal').classList.remove('open');
    });

    $('saveSettings').addEventListener('click', async () => {
      const smsg = $('settingsMsg');
      const days = [...document.querySelectorAll('#dayChecks input:checked')].map(i => Number(i.value));
      const body = {
        days,
        startTime: $('setStart').value,
        endTime: $('setEnd').value,
        slotMinutes: Number($('setSlot').value),
      };

      if (!days.length) { smsg.className = 'msg error'; smsg.textContent = 'Alege cel putin o zi.'; return; }
      if (!body.startTime || !body.endTime || toMinutes(body.startTime) >= toMinutes(body.endTime)) {
        smsg.className = 'msg error'; smsg.textContent = 'Intervalul orar nu este valid.'; return;
      }

      const saveBtn = $('saveSettings');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<span class="spinner"></span>Se salveaza...';

      try {
        const res = await fetch(`${WORKER_URL}/settings`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Password': $('adminPass').value,
          },
          body: JSON.stringify(body),
        });
        const json = await res.json();
        if (res.ok) {
          settings = json.settings;
          smsg.className = 'msg success';
          smsg.textContent = 'Setarile au fost salvate!';
          selectedDate = null;
          selectedTime = null;
          setStep(1);
          $('slotsSection').style.display = 'none';
          $('bookingForm').style.display = 'none';
          renderCalendar();
        } else {
          smsg.className = 'msg error';
          smsg.textContent = json.error || 'Eroare la salvare';
        }
      } catch (err) {
        smsg.className = 'msg error';
        smsg.textContent = 'Eroare: ' + err.message;
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Salveaza';
      }
    });

    // ---------- init ----------
    (async () => {
      try {
        const res = await fetch(`${WORKER_URL}/settings`);
        if (res.ok) settings = await res.json();
      } catch { /* folosim setarile implicite */ }
      renderCalendar();
    })();
  </script>
</body>
</html>
